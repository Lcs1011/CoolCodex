[ctool_command]
enabled = true

green_exact_commands = []
green_prefixes = []

yellow_prefixes = [
  "cargo check",
  "cargo build",
  "cargo test",
  "cargo fmt",
  "git status",
  "git diff",
  "git add",
  "git commit",
  "rg"
]

red_prefixes = [
  "del",
  "erase",
  "rmdir",
  "rd",
  "remove-item",
  "git reset --hard",
  "git clean -fd",
  "git clone",
  "powershell",
  "pwsh",
  "cmd",
  "python",
  "py",
  "python3",
  "node",
  "curl",
  "wget",
  "invoke-webrequest",
  "invoke-restmethod",
  "shutdown",
  "taskkill",
  "reg",
  "netsh",
  "start",
  "start-process",
  "explorer"
]

red_contains = [
  "http://",
  "https://",
  "ftp://",
  "download",
  ".exe",
  ".msi",
  ".dll",
  ".bat",
  ".cmd",
  ".ps1",
  ".sh",
  ".zip",
  ".rar",
  ".7z",
  ".tar",
  ".gz",
  "&&",
  "||",
  ">",
  ">>",
  "|"
]

blocked_prefixes = [
  "python -m venv",
  "py -m venv",
  "python3 -m venv",
  "virtualenv",
  "python -m virtualenv",
  "py -m virtualenv",
  "pip install",
  "pip3 install",
  "python -m pip install",
  "py -m pip install",
  "python3 -m pip install",
  "pipx install",
  "uv venv",
  "uv python install",
  "uv tool install",
  "rye",
  "hatch env",
  "pipenv install",
  "poetry install",
  "poetry env",
  "conda create",
  "conda install",
  "mamba create",
  "mamba install",
  "micromamba create",
  "micromamba install",
  "winget install python",
  "choco install python",
  "scoop install python",
  "msiexec",
  "python -m ensurepip",
  "py -m ensurepip"
]

blocked_contains = [
  "python.org",
  "install python",
  "python installer",
  "python-3.",
  "python3.",
  "venv",
  "virtualenv",
  "ensurepip",
  "pip install",
  "conda create",
  "conda install",
  "pyenv",
  "pyenv-win",
  "AppData\\Local\\Programs\\Python",
  "C:\\Python",
  "Program Files\\Python",
  "WindowsApps\\python",
  "setx PATH",
  "set PATH"
]
